  <style>
    /* ── HERO SLIDESHOW ─────────────────── */
    #home.hero {
      position: relative;
      overflow: hidden;
      background: #04060f;
    }
    .bg-slide {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0; opacity: 0;
      transform: scale(1);
      will-change: opacity, transform;
    }
    .bg-slide.s1 { background-image: url("https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=1800&q=90&auto=format&fit=crop"); animation: bgFade 16s ease-in-out infinite 0s, bgZoom 16s ease-in-out infinite 0s; }
    .bg-slide.s2 { background-image: url("https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=1800&q=90&auto=format&fit=crop"); animation: bgFade 16s ease-in-out infinite 4s, bgZoom 16s ease-in-out infinite 4s; }
    .bg-slide.s3 { background-image: url("https://images.unsplash.com/photo-1542051841857-5f90071e7989?w=1800&q=90&auto=format&fit=crop"); animation: bgFade 16s ease-in-out infinite 8s, bgZoom 16s ease-in-out infinite 8s; }
    .bg-slide.s4 { background-image: url("https://images.unsplash.com/photo-1605833556294-ea5c7a74f57d?w=1800&q=90&auto=format&fit=crop"); animation: bgFade 16s ease-in-out infinite 12s, bgZoom 16s ease-in-out infinite 12s; }
    @keyframes bgFade { 0%{opacity:0} 8%{opacity:1} 33%{opacity:1} 42%{opacity:0} 100%{opacity:0} }
    @keyframes bgZoom { 0%{transform:scale(1)} 42%{transform:scale(1.13)} 43%{transform:scale(1)} 100%{transform:scale(1)} }
    #home.hero::before { content:''; position:absolute; inset:0; background:rgba(4,6,14,0.42); z-index:1; pointer-events:none; }
    .fx-wrap { position:absolute; inset:0; z-index:2; pointer-events:none; }
    .fx-wrap .blob { position:absolute; border-radius:50%; filter:blur(60px); }
    .fx-wrap .b1 { width:55%; height:55%; top:0; left:-10%; background:radial-gradient(ellipse,rgba(255,40,10,0.16) 0%,transparent 70%); animation:b1 7s ease-in-out infinite alternate; }
    .fx-wrap .b2 { width:50%; height:50%; top:0; right:-8%; background:radial-gradient(ellipse,rgba(0,160,255,0.13) 0%,transparent 70%); animation:b2 9s ease-in-out infinite alternate; }
    .fx-wrap .b3 { width:45%; height:30%; top:38%; left:26%; background:radial-gradient(ellipse,rgba(255,200,0,0.10) 0%,transparent 70%); animation:b3 5.5s ease-in-out infinite alternate; }
    .fx-wrap .b4 { width:30%; height:40%; bottom:5%; left:8%; background:radial-gradient(ellipse,rgba(200,0,255,0.07) 0%,transparent 70%); animation:b4 8s ease-in-out infinite alternate; }
    .fx-wrap .vig { position:absolute; inset:0; background:radial-gradient(ellipse 80% 75% at 50% 50%,transparent 38%,rgba(2,4,12,0.72) 100%); }
    @keyframes b1 { 0%{opacity:.45;transform:scale(1) translate(0,0)} 100%{opacity:1;transform:scale(1.12) translate(5%,3%)} }
    @keyframes b2 { 0%{opacity:.35;transform:scale(1.05) translate(0,0)} 100%{opacity:.9;transform:scale(1) translate(-4%,5%)} }
    @keyframes b3 { 0%{opacity:.25;transform:scale(1)} 50%{opacity:.85;transform:scale(1.1)} 100%{opacity:.4;transform:scale(0.95)} }
    @keyframes b4 { 0%{opacity:.2;transform:scale(1)} 100%{opacity:.65;transform:scale(1.18)} }
    /* Hero card override — dark for slideshow */
    .hero-content {
      position:relative; z-index:3;
      background:rgba(4,6,14,0.42);
      border:1px solid rgba(255,255,255,0.14);
      box-shadow:0 20px 55px rgba(0,0,0,0.52);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
    }
    .hero-content::before {
      background:linear-gradient(90deg,transparent,rgba(196,168,90,0.45),transparent);
    }
    .hero-content h1 { color:#f2ece0; text-shadow:0 2px 18px rgba(0,0,0,0.45); }
    .hero-content h1 em { color:rgba(196,168,90,0.9); }
    .hero-content p { color:rgba(240,232,215,0.86); text-shadow:0 1px 10px rgba(0,0,0,0.35); }

    /* Slide indicator dots */
    .slide-dots {
      position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
      z-index:4; display:flex; gap:8px; align-items:center;
    }
    .slide-dot {
      width:6px; height:6px; border-radius:50%;
      background:rgba(255,255,255,0.35);
      transition:background 0.3s, transform 0.3s, width 0.3s;
      cursor:pointer;
    }
    .slide-dot.active { background:var(--gold); transform:scale(1.3); width:20px; border-radius:4px; }

    @media (max-width:768px) { .bg-slide { background-position:60% center; } }
    @media (prefers-reduced-motion:reduce) {
      .bg-slide { animation:bgFade 16s ease-in-out infinite; will-change:auto; }
      .bg-slide.s1{animation-delay:0s} .bg-slide.s2{animation-delay:4s} .bg-slide.s3{animation-delay:8s} .bg-slide.s4{animation-delay:12s}
    }

    /* ── HOME PAGE SECTIONS ─────────────── */
    .home-services { background:#f7f3ec; }
    .home-why      { background:#fbf9f4; }
    .home-cta      { background:var(--beige-bg); padding:80px 24px; text-align:center; }
    .home-cta h2   { font-family:var(--font-display); font-size:clamp(26px,4vw,44px); font-weight:400; color:var(--text-dark); margin-bottom:14px; }
    .home-cta h2 em { font-style:italic; color:var(--olive); }
    .home-cta p    { font-size:15px; color:var(--text-muted); max-width:460px; margin:0 auto 30px; font-weight:300; line-height:1.8; }
    .home-cta h2::after { display:none; }

    /* Why choose us icons */
    .why-icon { font-size:32px; margin-bottom:14px; display:block; transition:transform 0.32s cubic-bezier(0.22,1,0.36,1); }
    .card:hover .why-icon { transform:scale(1.2) translateY(-3px); }

    /* Stats bar */
    .stats-bar {
      background:linear-gradient(135deg,#2a3810,#3f5220);
      padding:52px 40px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:24px;
      text-align:center;
    }
    .stat-item {}
    .stat-num {
      font-family:var(--font-display);
      font-size:clamp(36px,5vw,56px);
      font-weight:600;
      color:var(--gold);
      line-height:1;
      letter-spacing:-1px;
    }
    .stat-label {
      font-family:var(--font-body);
      font-size:12px;
      font-weight:500;
      color:rgba(255,255,255,0.62);
      letter-spacing:2px;
      text-transform:uppercase;
      margin-top:8px;
    }
    @media (max-width:768px) { .stats-bar { grid-template-columns:repeat(2,1fr); padding:40px 20px; } }
    @media (max-width:420px) { .stats-bar { grid-template-columns:1fr 1fr; gap:20px; } }
  </style>

  <script src="script.js"></script>
  <script>
    /* Slide dot sync with bgFade animation */
    const dots = document.querySelectorAll('.slide-dot');
    let activeDot = 0;
    function syncDots() {
      dots.forEach((d,i) => d.classList.toggle('active', i === activeDot));
      activeDot = (activeDot + 1) % dots.length;
    }
    syncDots();
    setInterval(syncDots, 4000);
    dots.forEach((d) => {
      d.addEventListener('click', () => {
        activeDot = parseInt(d.dataset.slide);
        dots.forEach((x,i) => x.classList.toggle('active', i === activeDot));
      });
    });
  </script>
