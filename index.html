<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Makers</title>
  <link rel="stylesheet" href="style.css?v=5" />
  <style>
    /* ── Hero: night cityscape background ── */
    #home.hero {
      background-image: url("https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1600&q=85&auto=format&fit=crop");
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Darker overlay so text stays crisp over the city lights */
    #home.hero::before {
      background: rgba(10, 18, 8, 0.52);
    }

    /* Text colours adjusted for dark bg */
    .hero-content h1 {
      color: #f2ece0;
      text-shadow: 0 2px 18px rgba(0,0,0,0.45);
    }
    .hero-content p {
      color: rgba(240, 232, 215, 0.88);
      text-shadow: 0 1px 10px rgba(0,0,0,0.35);
    }

    /* Glass card: darker tint to suit night scene */
    .hero-content {
      background: rgba(12, 20, 8, 0.38);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 20px 55px rgba(0,0,0,0.35);
    }

    /* Mobile: disable fixed attachment (iOS bug) */
    @media (max-width: 768px) {
      #home.hero {
        background-attachment: scroll;
        background-position: center center;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <button class="hamburger" onclick="toggleMenu()" aria-label="Open Menu">☰</button>
    <a href="index.html" class="logo-link">
      <img
        src="https://i.ibb.co/8D9h6fCw/Whats-App-Image-2026-02-07-at-3-25-08-PM-1.jpg"
        alt="Sign Makers Pune Logo"
        class="logo"
      />
    </a>
  </header>

  <!-- MOBILE SLIDE MENU -->
  <nav id="mobileMenu" class="mobile-menu">
    <button class="close-menu" onclick="toggleMenu()">✖</button>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="products.html">Products</a>
    <a href="projects.html">Projects</a>
    <a href="reviews.html">Testimonials</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- HERO SECTION -->
  <section id="home" class="hero">
    <div class="hero-content">
      <h1>Welcome to Sign Makers</h1>
      <p>Premium Sign Boards &amp; Shop Branding in Pune</p>
      <a href="products.html" class="hero-btn">Explore Products</a>
    </div>
  </section>

  <script>
    function toggleMenu() {
      document.getElementById("mobileMenu").classList.toggle("active");
    }
  </script>

</body>
</html>

  <script src="script.js"></script>
</body>
</html>
