<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Effect</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .parallax {
            background-image: url('https://example.com/image1.jpg');
            height: 100vh;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
        .section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
        .section1 { background-color: rgba(0, 0, 0, 0.7); }
        .section2 { background-color: rgba(255, 0, 0, 0.7); }
        .section3 { background-color: rgba(0, 0, 255, 0.7); }
        h1 {
            font-size: 4em;
            animation: zoom 1s ease-in-out infinite alternate;
        }
        @keyframes zoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="parallax"></div>
    <div class="section section1">
        <h1>Welcome to the Parallax Effect</h1>
    </div>
    <div class="parallax"></div>
    <div class="section section2">
        <h1>Experience the Magic</h1>
    </div>
    <div class="parallax"></div>
    <div class="section section3">
        <h1>Enjoy the View</h1>
    </div>

</body>
</html>
