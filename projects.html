  <style>
    /* ═══════════════════════════════════════
       PROJECTS SHOWCASE — PREMIUM GALLERY
    ════════════════════════════════════════ */

    #projects.section {
      padding-bottom: 100px;
    }

    /* ── Intro ── */
    .projects-intro {
      max-width: 600px;
      margin: 0 auto 52px;
      text-align: center;
    }
    .projects-intro p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.85;
      margin-top: 10px;
    }

    /* ── Uniform Grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4px;
    }

    /* ── Each tile ── */
    .project-item {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #e8e2d8;
      /* Perfect square tiles */
      aspect-ratio: 1 / 1;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.09);
      transition: transform 0.32s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.32s ease;
    }

    .project-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 16px 38px rgba(85,107,47,0.18);
      z-index: 2;
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }

    .project-item:hover img {
      transform: scale(1.08);
    }

    /* Hover overlay */
    .project-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(30, 45, 15, 0.55) 100%
      );
      opacity: 0;
      transition: opacity 0.32s ease;
      pointer-events: none;
    }
    .project-item:hover::after { opacity: 1; }

    /* Zoom icon on hover */
    .project-item .zoom-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.7);
      opacity: 0;
      z-index: 3;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.22,1,0.36,1);
    }
    .project-item .zoom-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--olive);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }
    .project-item:hover .zoom-icon {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ── Video tile — spans 2 cols ── */
    .project-item.video-tile {
      aspect-ratio: 16 / 9;
      grid-column: span 2;
    }
    .project-item.video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* hide zoom icon on video */
    .project-item.video-tile .zoom-icon { display: none; }
    .project-item.video-tile::after { display: none; }
    .project-item.video-tile:hover { transform: translateY(-4px); }

    /* ══════════════════════════════════════
       LIGHTBOX
    ═══════════════════════════════════════ */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: rgba(8, 14, 6, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      width: auto;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      transform: scale(0.92);
      transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
      display: block;
      object-fit: contain;
    }
    .lightbox.open .lightbox-img {
      transform: scale(1);
    }

    /* Counter */
    .lightbox-counter {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Jost", sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1.5px;
      white-space: nowrap;
    }

    /* Close */
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 20px;
      transition: background 0.2s, transform 0.3s;
      z-index: 10;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
      transform: rotate(90deg);
    }

    /* Prev / Next */
    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: background 0.2s, transform 0.2s;
      z-index: 10;
    }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-prev:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.08); }
    .lightbox-next:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.08); }
    .lightbox-prev svg,
    .lightbox-next svg,
    .lightbox-close svg {
      width: 20px;
      height: 20px;
      stroke: white;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .projects-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 768px) {
      .projects-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .project-item.video-tile {
        grid-column: span 2;
      }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
      .lightbox-img {
        max-width: 95vw;
        max-height: 80vh;
      }
    }

    @media (max-width: 420px) {
      .projects-grid { gap: 8px; }
    }
  </style>

    </button>
    <button class="lightbox-prev" id="lbPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lbImg" src="" alt="">
      <div class="lightbox-counter" id="lbCounter"></div>
    </div>
    <button class="lightbox-next" id="lbNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <script src="script.js"></script>
  <script>
    /* ── Lightbox ─────────────────────────────── */
    const items    = Array.from(document.querySelectorAll(".project-item:not(.video-tile)"));
    const images   = items.map(el => ({ src: el.querySelector("img").src, alt: el.querySelector("img").alt }));
    const lightbox = document.getElementById("lightbox");
    const lbImg    = document.getElementById("lbImg");
    const lbCounter= document.getElementById("lbCounter");
    let current    = 0;

    function openLightbox(index) {
      current = index;
      lbImg.src = images[current].src;
      lbImg.alt = images[current].alt;
      lbCounter.textContent = (current + 1) + " / " + images.length;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
      setTimeout(() => { lbImg.src = ""; }, 300);
    }

    function navigate(dir) {
      current = (current + dir + images.length) % images.length;
      lbImg.style.opacity = "0";
      lbImg.style.transform = "scale(0.94)";
      setTimeout(() => {
        lbImg.src = images[current].src;
        lbImg.alt = images[current].alt;
        lbCounter.textContent = (current + 1) + " / " + images.length;
        lbImg.style.opacity = "1";
        lbImg.style.transform = "scale(1)";
      }, 150);
    }

    lbImg.style.transition = "opacity 0.15s ease, transform 0.15s ease";

    items.forEach((item, i) => {
      item.addEventListener("click", () => openLightbox(i));
    });

    document.getElementById("lbClose").addEventListener("click", closeLightbox);
    document.getElementById("lbPrev").addEventListener("click", () => navigate(-1));
    document.getElementById("lbNext").addEventListener("click", () => navigate(1));

    /* Click backdrop to close */
    lightbox.addEventListener("click", e => {
      if (e.target === lightbox) closeLightbox();
    });

    /* Keyboard navigation */
    document.addEventListener("keydown", e => {
      if (!lightbox.classList.contains("open")) return;
      if (e.key === "ArrowRight") navigate(1);
      if (e.key === "ArrowLeft")  navigate(-1);
      if (e.key === "Escape")     closeLightbox();
    });

    /* Touch swipe support */
    let touchStartX = 0;
    lightbox.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener("touchend",   e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    });
  </script>
</body>
</html>
